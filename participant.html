<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Получить грамоту</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 20px; max-width: 500px; width: 100%; padding: 40px; }
        h1 { text-align: center; margin-bottom: 10px; }
        .comp-name { text-align: center; color: #667eea; margin-bottom: 30px; font-weight: bold; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; }
        input { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .message { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        .loading { text-align: center; margin: 20px 0; }
        .error-page { text-align: center; padding: 20px; }
        .error-page h2 { color: #e74c3c; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="errorBlock" style="display: none;" class="error-page"><h2>❌ Ошибка</h2><p id="errorMessage"></p></div>
        <div id="formBlock">
            <h1>📄 Получить грамоту</h1>
            <div id="compNameDisplay" class="comp-name"></div>
            <div class="form-group"><label>Введите ваш email</label><input type="email" id="emailInput" placeholder="email@example.com"></div>
            <button onclick="findParticipant()">Найти грамоту</button>
            <div id="loading" class="loading" style="display: none;">⏳ Создание грамоты...</div>
            <div id="result" class="message"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://kcpyfbdslhisfqqobvje.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtjcHlmYmRzbGhpc2ZxcW9idmplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1Mjg1OTAsImV4cCI6MjA5MzEwNDU5MH0.Y4861DLKZ0FG3_rkosf_qH0w5P2F_hdheIBOfTTSmsI";
        const BACKGROUND_IMG_URL = "https://i.ibb.co/WNG80MfL/0.png";
        
        // КООРДИНАТЫ (оставляем как у вас)
        const Y = {
            headerStart: 280,        
            award: 420,             
            name: 450,              
            place: 500,             
            district: 540,          
            competition: 570,       
            result: 600,            
            signLabel: 730,         
            signName: 750,          
            datePlace1: 730,        // дата (первая строка)
            datePlace2: 750         // место проведения (вторая строка)
        };
        
        let supabaseClient = null;
        let currentCompetition = null;
        let currentParticipant = null;
        
        // Функция родительного падежа для полного имени
        function toGenitiveCase(name) {
            if (!name) return '';
            const parts = name.trim().split(/\s+/);
            const genitiveParts = parts.map(part => {
                if (part.endsWith('а') || part.endsWith('я')) return part;
                if (part.endsWith('ий')) return part.slice(0, -2) + 'ия';
                if (part.endsWith('ь')) return part.slice(0, -1) + 'я';
                return part + 'а';
            });
            return genitiveParts.join(' ');
        }
        
        function formatDate(dateString) {
            if (!dateString) return '';
            if (dateString.includes('-')) {
                const parts = dateString.split('-');
                if (parts.length === 3) {
                    return `${parts[2]}.${parts[1]}.${parts[0]}`;
                }
            }
            return dateString;
        }
        
        function getCompId() { return parseInt(new URLSearchParams(window.location.search).get('comp')); }
        
        async function init() {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            const compId = getCompId();
            if (!compId || isNaN(compId)) { showError('Ссылка недействительна.'); return; }
            const { data, error } = await supabaseClient.from('competitions').select('*').eq('id', compId);
            if (error || !data || data.length === 0) { showError('Соревнование не найдено.'); return; }
            currentCompetition = data[0];
            document.getElementById('compNameDisplay').innerHTML = `🏆 ${currentCompetition.name}`;
            document.getElementById('formBlock').style.display = 'block';
        }
        
        function showError(msg) {
            document.getElementById('formBlock').style.display = 'none';
            document.getElementById('errorMessage').textContent = msg;
            document.getElementById('errorBlock').style.display = 'block';
        }
        
        async function findParticipant() {
            const email = document.getElementById('emailInput').value.trim();
            if (!email) { alert('Введите email'); return; }
            document.getElementById('loading').style.display = 'block';
            const { data } = await supabaseClient.from('participants').select('*').eq('competition_id', currentCompetition.id).eq('email', email);
            document.getElementById('loading').style.display = 'none';
            if (!data || data.length === 0) { showMessage('Участник не найден', 'error'); return; }
            const p = data[0];
            if (p.place === 'Не определено') { showMessage('Результаты ещё не опубликованы', 'info'); return; }
            currentParticipant = p;
            await generateAndDownloadPDF();
        }
        
        async function generateAndDownloadPDF() {
            const p = currentParticipant;
            const comp = currentCompetition;
            const placeText = p.place;
            const nameGenitive = toGenitiveCase(p.member1_name || '');
            const formattedDate = formatDate(comp.date);
            
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.src = BACKGROUND_IMG_URL;
            await new Promise((resolve, reject) => { img.onload = resolve; img.onerror = reject; });
            
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            
            // 1. ШАПКА (разбита на 4 строки)
            ctx.font = 'bold 20px "Times New Roman", Georgia, serif';
            ctx.fillStyle = '#000000';
            ctx.textAlign = 'center';
            const headerLines = [
                'Управление культуры, молодёжи и спорта',
                'муниципального образования',
                '«Муниципальный округ Дебёсский район',
                'Удмуртской Республики»'
            ];
            let headerY = Y.headerStart;
            headerLines.forEach(line => {
                ctx.fillText(line, centerX, headerY);
                headerY += 28;
            });
            
            // 2. НАГРАЖДАЕТ
            ctx.font = 'bold 28px "Times New Roman", Georgia, serif';
            ctx.fillText('НАГРАЖДАЕТ', centerX, Y.award);
            
            // 3. ИМЯ (в родительном падеже)
            ctx.font = 'bold 22px "Times New Roman", Georgia, serif';
            ctx.fillText(nameGenitive, centerX, Y.name);
            
            // 4. МЕСТО
            ctx.font = 'bold 24px "Times New Roman", Georgia, serif';
            ctx.fillText(`за ${placeText} место`, centerX, Y.place);
            
            // 5. В РАЙОННЫХ СОРЕВНОВАНИЯХ
            ctx.font = '20px "Times New Roman", Georgia, serif';
            ctx.fillText('в районных соревнованиях', centerX, Y.district);
            
            // 6. СОРЕВНОВАНИЕ (в кавычках)
            ctx.font = 'bold 22px "Times New Roman", Georgia, serif';
            ctx.fillText(`«${comp.name}»`, centerX, Y.competition);
            
            // 7. РЕЗУЛЬТАТ ("с результатом")
            if (p.result && p.result.trim() !== '') {
                ctx.font = '20px "Times New Roman", Georgia, serif';
                ctx.fillText(`с результатом ${p.result}`, centerX, Y.result);
            }
            
            // 8. НАЧАЛЬНИК (слева)
            ctx.font = '20px "Times New Roman", Georgia, serif';
            ctx.textAlign = 'left';
            ctx.fillText('Начальник', 80, Y.signLabel);
            
            // 9. ПОДПИСЬ
            ctx.font = 'bold 20px "Times New Roman", Georgia, serif';
            ctx.fillText('А.С. Дурновцев', 80, Y.signName);
            
            // 10. ДАТА И МЕСТО (справа, две строки)
            ctx.font = '20px "Times New Roman", Georgia, serif';
            ctx.textAlign = 'right';
            ctx.fillText(formattedDate, canvas.width - 60, Y.datePlace1);
            ctx.fillText(comp.event_place || '', canvas.width - 60, Y.datePlace2);
            
            const imgData = canvas.toDataURL('image/png');
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
            const imgWidth = 210;
            const imgHeight = (canvas.height * imgWidth) / canvas.width;
            doc.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);
            doc.save(`Грамота_${p.member1_name}.pdf`);
            
            showMessage('✅ Грамота готова!', 'success');
        }
        
        function showMessage(msg, type) {
            const div = document.getElementById('result');
            div.className = `message ${type}`;
            div.textContent = msg;
            div.style.display = 'block';
            document.getElementById('loading').style.display = 'none';
        }
        
        document.getElementById('formBlock').style.display = 'none';
        init();
    </script>
</body>
</html>
