<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Получить грамоту</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 20px; max-width: 500px; width: 100%; padding: 40px; }
        h1 { text-align: center; margin-bottom: 10px; }
        .comp-name { text-align: center; color: #667eea; margin-bottom: 30px; font-weight: bold; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; }
        input { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .message { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        .loading { text-align: center; margin: 20px 0; }
        .error-page { text-align: center; padding: 20px; }
        .error-page h2 { color: #e74c3c; margin-bottom: 15px; }
        /* Стили для генерации PDF */
        .pdf-source { position: absolute; left: -9999px; top: -9999px; width: 800px; background: white; font-family: 'Times New Roman', Georgia, serif; }
    </style>
</head>
<body>
    <div class="container">
        <div id="errorBlock" style="display: none;" class="error-page"><h2>❌ Ошибка</h2><p id="errorMessage"></p></div>
        <div id="formBlock">
            <h1>📄 Получить грамоту</h1>
            <div id="compNameDisplay" class="comp-name"></div>
            <div class="form-group"><label>Введите ваш email</label><input type="email" id="emailInput" placeholder="email@example.com"></div>
            <button onclick="findParticipant()">Найти грамоту</button>
            <div id="loading" class="loading" style="display: none;">⏳ Создание грамоты...</div>
            <div id="result" class="message"></div>
        </div>
    </div>
    <div id="pdfSource" class="pdf-source"></div>

    <script>
        // ========== ВАШИ КЛЮЧИ ==========
        const SUPABASE_URL = "https://kcpyfbdslhisfqqobvje.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtjcHlmYmRzbGhpc2ZxcW9idmplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1Mjg1OTAsImV4cCI6MjA5MzEwNDU5MH0.Y4861DLKZ0FG3_rkosf_qH0w5P2F_hdheIBOfTTSmsI";
        
        let supabaseClient = null;
        let currentCompetition = null;
        let currentParticipant = null;
        
        function getCompId() { const urlParams = new URLSearchParams(window.location.search); return parseInt(urlParams.get('comp')); }
        
        async function init() {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            const compId = getCompId();
            if (!compId || isNaN(compId)) { showError('Ссылка недействительна.'); return; }
            const { data, error } = await supabaseClient.from('competitions').select('*').eq('id', compId);
            if (error || !data || data.length === 0) { showError('Соревнование не найдено.'); return; }
            currentCompetition = data[0];
            document.getElementById('compNameDisplay').innerHTML = `🏆 ${currentCompetition.name}`;
            document.getElementById('formBlock').style.display = 'block';
        }
        
        function showError(msg) { 
            document.getElementById('formBlock').style.display = 'none'; 
            document.getElementById('errorMessage').textContent = msg; 
            document.getElementById('errorBlock').style.display = 'block'; 
        }
        
        async function findParticipant() {
            const email = document.getElementById('emailInput').value.trim();
            if (!email) { alert('Введите email'); return; }
            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').style.display = 'none';
            const { data } = await supabaseClient.from('participants').select('*').eq('competition_id', currentCompetition.id).eq('email', email);
            document.getElementById('loading').style.display = 'none';
            if (!data || data.length === 0) { showMessage('Участник не найден', 'error'); return; }
            const p = data[0];
            if (p.place === 'Не определено') { showMessage('Результаты ещё не опубликованы', 'info'); return; }
            currentParticipant = p;
            await generateCertificatePDF();
        }
        
        async function generateCertificatePDF() {
            const comp = currentCompetition;
            const p = currentParticipant;
            
            // Форматируем место
            let placeText = p.place;
            if (p.place === '1') placeText = 'I';
            else if (p.place === '2') placeText = 'II';
            else if (p.place === '3') placeText = 'III';
            
            // HTML-шаблон грамоты (восстановлен из вашего DOCX)
            const templateHtml = `
                <div style="width: 800px; background: white; padding: 40px; text-align: center; font-family: 'Times New Roman', Georgia, serif;">
                    <!-- Золотая рамка -->
                    <div style="border: 12px solid #d4af37; background: white; padding: 20px;">
                        <div style="border: 2px solid #d4af37; padding: 25px;">
                            
                            <!-- Шапка -->
                            <div style="font-size: 13px; line-height: 1.4; margin-bottom: 30px;">
                                Управление культуры, молодёжи и спорта<br>
                                муниципального образования «Муниципальный округ Дебёсский район Удмуртской Республики»
                            </div>
                            
                            <!-- Заголовок -->
                            <div style="font-size: 42px; font-weight: bold; letter-spacing: 6px; margin: 20px 0;">ГРАМОТА</div>
                            
                            <!-- Текст награждения -->
                            <div style="font-size: 18px; margin: 15px 0;">НАГРАЖДАЕТ</div>
                            <div style="font-size: 24px; font-weight: bold; margin: 15px 0;">${p.member1_name || ''}</div>
                            <div style="font-size: 18px; margin: 15px 0;">за <span style="font-size: 28px; font-weight: bold;">${placeText}</span> место</div>
                            <div style="font-size: 16px; margin: 20px 0;">в районных соревнованиях</div>
                            <div style="font-size: 18px; font-weight: bold; margin: 10px 0;">«Универсальный спортсмен»,</div>
                            <div style="font-size: 16px; margin: 10px 0;">посвященных Дню физкультурника.</div>
                            
                            <!-- Результат если есть -->
                            ${p.result ? `<div style="font-size: 14px; margin: 15px 0;">результат: ${p.result}</div>` : ''}
                            
                            <!-- Подпись и печать -->
                            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-top: 50px;">
                                <div style="text-align: left;">
                                    <div style="font-size: 14px;">Начальник</div>
                                    <div style="font-family: 'Brush Script MT', cursive; font-size: 24px; margin-top: 5px;">А.С. Дурновцев</div>
                                </div>
                                <div style="text-align: right;">
                                    <div style="font-size: 14px;">М.П.</div>
                                </div>
                            </div>
                            
                            <!-- Дата и место -->
                            <div style="text-align: right; font-size: 13px; margin-top: 40px;">
                                с. Дебёсы, ${comp.date || '________'}
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            const container = document.getElementById('pdfSource');
            container.innerHTML = templateHtml;
            showMessage('⏳ Создание грамоты...', 'info');
            await new Promise(r => setTimeout(r, 200));
            
            const opt = {
                margin: [0, 0, 0, 0],
                filename: `Грамота_${p.member1_name}.pdf`,
                image: { type: 'jpeg', quality: 1.0 },
                html2canvas: { scale: 2, letterRendering: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            
            await html2pdf().set(opt).from(container).save();
            container.innerHTML = '';
            showMessage('✅ Грамота готова!', 'success');
        }
        
        function showMessage(msg, type) { 
            const div = document.getElementById('result'); 
            div.className = `message ${type}`; 
            div.textContent = msg; 
            div.style.display = 'block'; 
        }
        
        document.getElementById('formBlock').style.display = 'none';
        init();
    </script>
</body>
</html>
