<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Получить грамоту</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 20px; width: 100%; max-width: 500px; padding: 40px; }
        h1 { text-align: center; margin-bottom: 10px; }
        .comp-name { text-align: center; color: #667eea; margin-bottom: 30px; font-weight: bold; font-size: 18px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; }
        input { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .message { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        .loading { text-align: center; margin: 20px 0; }
        .error-page { text-align: center; padding: 20px; }
        .error-page h2 { color: #e74c3c; margin-bottom: 15px; }
        .certificate-template { position: absolute; left: -9999px; top: -9999px; width: 800px; background: white; font-family: 'Times New Roman', 'Georgia', serif; }
    </style>
</head>
<body>
    <div class="container">
        <div id="errorBlock" style="display: none;" class="error-page">
            <h2>❌ Ошибка</h2>
            <p id="errorMessage"></p>
            <p>Пожалуйста, обратитесь к организатору соревнований.</p>
        </div>
        <div id="formBlock">
            <h1>📄 Получить грамоту</h1>
            <div id="compNameDisplay" class="comp-name"></div>
            <div class="form-group">
                <label>Введите ваш email</label>
                <input type="email" id="emailInput" placeholder="email@example.com">
            </div>
            <button onclick="findParticipant()">Найти грамоту</button>
            <div id="loading" class="loading" style="display: none;">⏳ Поиск и создание грамоты...</div>
            <div id="result" class="message"></div>
        </div>
    </div>
    <div id="certificateTemplate" class="certificate-template"></div>

    <script>
        const SUPABASE_URL = "https://kcpyfbdslhisfqqobvje.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtjcHlmYmRzbGhpc2ZxcW9idmplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1Mjg1OTAsImV4cCI6MjA5MzEwNDU5MH0.Y4861DLKZ0FG3_rkosf_qH0w5P2F_hdheIBOfTTSmsI";
        
        let supabaseClient = null;
        let currentCompetition = null;
        let currentParticipant = null;
        
        function getCompId() {
            const urlParams = new URLSearchParams(window.location.search);
            return parseInt(urlParams.get('comp'));
        }
        
        async function init() {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            const compId = getCompId();
            if (!compId || isNaN(compId)) { showError('Ссылка недействительна. Отсутствует ID соревнования.'); return; }
            const { data, error } = await supabaseClient.from('competitions').select('*').eq('id', compId);
            if (error || !data || data.length === 0) { showError('Соревнование не найдено. Проверьте ссылку.'); return; }
            currentCompetition = data[0];
            document.getElementById('compNameDisplay').innerHTML = `🏆 ${currentCompetition.name}`;
            document.getElementById('formBlock').style.display = 'block';
        }
        
        function showError(msg) {
            document.getElementById('formBlock').style.display = 'none';
            document.getElementById('errorMessage').textContent = msg;
            document.getElementById('errorBlock').style.display = 'block';
        }
        
        async function findParticipant() {
            const email = document.getElementById('emailInput').value.trim();
            if (!email) { alert('Введите email'); return; }
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').style.display = 'none';
            
            const { data } = await supabaseClient.from('participants').select('*').eq('competition_id', currentCompetition.id).eq('email', email);
            
            document.getElementById('loading').style.display = 'none';
            
            if (!data || data.length === 0) {
                showMessage('Участник с таким email не найден в этом соревновании', 'error');
                return;
            }
            
            const p = data[0];
            if (p.place === 'Не определено') {
                showMessage('Результаты ещё не опубликованы. Зайдите позже.', 'info');
                return;
            }
            
            currentParticipant = p;
            await generateAndDownloadPDF();
        }
        
        async function generateAndDownloadPDF() {
            const comp = currentCompetition;
            const p = currentParticipant;
            
            // Форматируем место (римские цифры для 1,2,3 или как есть)
            let placeText = p.place;
            if (p.place === '1') placeText = 'I';
            else if (p.place === '2') placeText = 'II';
            else if (p.place === '3') placeText = 'III';
            
            // Собираем результат, если есть
            const resultHtml = p.result && p.result.trim() !== '' ? `<div style="font-size: 14px; margin: 5px 0;">результат: ${p.result}</div>` : '';
            
            // Собираем имена участников
            const membersHtml = p.member2_name && p.member2_name.trim() !== '' 
                ? `<div style="font-size: 24px; font-weight: bold; margin: 10px 0;">${p.member1_name}<br>${p.member2_name}</div>`
                : `<div style="font-size: 24px; font-weight: bold; margin: 10px 0;">${p.member1_name}</div>`;
            
            const certificateHTML = `
                <div style="width: 800px; min-height: 566px; background: white; position: relative; padding: 30px 25px; box-sizing: border-box; font-family: 'Times New Roman', 'Georgia', serif;">
                    <!-- Шапка -->
                    <div style="text-align: center; margin-bottom: 15px;">
                        <div style="font-size: 11px; line-height: 1.4; color: #333;">${(comp.org_header || '').replace(/\n/g, '<br>')}</div>
                    </div>
                    
                    <!-- Основное содержание -->
                    <div style="text-align: center; margin-top: 15px;">
                        <div style="font-size: 38px; font-weight: bold; letter-spacing: 4px; margin: 15px 0;">ГРАМОТА</div>
                        <div style="font-size: 20px; margin: 15px 0;">награждается</div>
                        
                        ${membersHtml}
                        
                        <div style="font-size: 20px; margin: 10px 0;">команда, занявшая</div>
                        <div style="font-size: 44px; font-weight: bold; color: #b8860b; margin: 5px 0;">${placeText} место</div>
                        
                        <div style="font-size: 16px; margin: 10px 0;">в ${comp.name}</div>
                        
                        ${resultHtml}
                    </div>
                    
                    <!-- Подпись (изображение) и печать -->
                    <div style="margin-top: 30px; display: flex; justify-content: space-between; align-items: flex-end;">
                        <div style="width: 120px;">
                            <img src="https://i.ibb.co/7Sg6S7N/image.png" style="width: 100%; height: auto;">
                        </div>
                        <div style="text-align: right; font-size: 12px;">
                            М.П.
                        </div>
                    </div>
                    
                    <!-- Дата и место проведения -->
                    <div style="margin-top: 20px; text-align: right; font-size: 12px;">
                        ${comp.event_place ? comp.event_place + ', ' : ''}${comp.date}
                    </div>
                </div>
            `;
            
            const templateDiv = document.getElementById('certificateTemplate');
            templateDiv.innerHTML = certificateHTML;
            showMessage('⏳ Создание грамоты...', 'info');
            await new Promise(resolve => setTimeout(resolve, 200));
            
            const element = templateDiv.firstElementChild;
            const canvas = await html2canvas(element, { scale: 3, backgroundColor: '#ffffff', logging: false });
            const { jsPDF } = window.jspdf;
            const imgData = canvas.toDataURL('image/png');
            const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
            const imgWidth = 210;
            const imgHeight = (canvas.height * imgWidth) / canvas.width;
            doc.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);
            doc.save(`Грамота_${p.member1_name}.pdf`);
            
            templateDiv.innerHTML = '';
            showMessage('✅ Грамота скачана!', 'success');
        }
        
        function showMessage(msg, type) {
            const div = document.getElementById('result');
            div.className = `message ${type}`;
            div.textContent = msg;
            div.style.display = 'block';
        }
        
        document.getElementById('formBlock').style.display = 'none';
        init();
    </script>
</body>
</html>
