<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Получить грамоту</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 20px; width: 100%; max-width: 500px; padding: 40px; }
        h1 { text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 10px; cursor: pointer; }
        .message { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        .loading { text-align: center; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 Получить грамоту</h1>
        <div class="form-group"><label>Выберите соревнование</label><select id="competitionSelect" onchange="clearResult()"></select></div>
        <div class="form-group"><label>Введите ваш email</label><input type="email" id="emailInput" placeholder="email@example.com"></div>
        <button onclick="findParticipant()">Найти грамоту</button>
        <div id="loading" class="loading" style="display: none;">⏳ Поиск...</div>
        <div id="result" class="message"></div>
    </div>
    <script>
        // ========== ВСТАВЬТЕ ВАШИ КЛЮЧИ ==========
        const SUPABASE_URL = "https://kcpyfbdslhisfqqobvje.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtjcHlmYmRzbGhpc2ZxcW9idmplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1Mjg1OTAsImV4cCI6MjA5MzEwNDU5MH0.Y4861DLKZ0FG3_rkosf_qH0w5P2F_hdheIBOfTTSmsI";
        // =======================================
        
        let supabaseClient = null;
        let competitions = [];
        
        async function init() {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            await loadCompetitions();
        }
        
        async function loadCompetitions() {
            const { data } = await supabaseClient.from('competitions').select('*');
            competitions = data || [];
            const select = document.getElementById('competitionSelect');
            select.innerHTML = '<option value="">-- Выберите соревнование --</option>' + competitions.map(c => `<option value="${c.id}">${c.name} (${c.date})</option>`).join('');
        }
        
        async function findParticipant() {
            const compId = document.getElementById('competitionSelect').value;
            const email = document.getElementById('emailInput').value.trim();
            if (!compId || !email) { alert('Выберите соревнование и введите email'); return; }
            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').style.display = 'none';
            const { data, error } = await supabaseClient.from('participants').select('*').eq('competition_id', parseInt(compId)).eq('email', email);
            document.getElementById('loading').style.display = 'none';
            if (error || !data || data.length === 0) { showMessage('Участник с таким email не найден в этом соревновании', 'error'); return; }
            const p = data[0];
            if (p.place === 'Не определено') { showMessage('Результаты ещё не опубликованы. Зайдите позже.', 'info'); return; }
            generatePDF(p);
        }
        
        async function generatePDF(p) {
            const comp = competitions.find(c => c.id === p.competition_id);
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
            doc.setFillColor(255, 215, 0); doc.rect(0, 0, 297, 210, 'F');
            doc.setFillColor(255, 255, 255); doc.rect(5, 5, 287, 200, 'F');
            doc.setDrawColor(255, 215, 0); doc.setLineWidth(2); doc.rect(10, 10, 277, 190);
            doc.setFontSize(48); doc.text('ГРАМОТА', 148.5, 45, { align: 'center' });
            doc.setFontSize(18); doc.text('НАГРАЖДАЕТСЯ', 148.5, 75, { align: 'center' });
            doc.setFontSize(26); doc.text(p.name, 148.5, 100, { align: 'center' });
            doc.setFontSize(18); doc.text(`занявший(ая) ${p.place} место`, 148.5, 125, { align: 'center' });
            doc.setFontSize(16); doc.text(`в соревнованиях "${comp ? comp.name : ''}"`, 148.5, 145, { align: 'center' });
            doc.setFontSize(12); doc.text(comp ? comp.date : '', 148.5, 170, { align: 'center' });
            doc.setFontSize(10); doc.text('Председатель оргкомитета', 70, 190); doc.text('__________________', 70, 195);
            doc.text('М.П.', 240, 190);
            doc.save(`Грамота_${p.name}.pdf`);
            showMessage('Грамота скачана!', 'success');
        }
        
        function showMessage(msg, type) {
            const div = document.getElementById('result');
            div.className = `message ${type}`;
            div.textContent = msg;
            div.style.display = 'block';
        }
        function clearResult() { document.getElementById('result').style.display = 'none'; }
        init();
    </script>
</body>
</html>
