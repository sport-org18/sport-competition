<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Получить грамоту</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 20px; max-width: 500px; width: 100%; padding: 40px; }
        h1 { text-align: center; margin-bottom: 10px; }
        .comp-name { text-align: center; color: #667eea; margin-bottom: 30px; font-weight: bold; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; }
        input { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .message { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        .loading { text-align: center; margin: 20px 0; display: none; }
        .error-page { text-align: center; padding: 20px; }
        .error-page h2 { color: #e74c3c; margin-bottom: 15px; }
        
        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            margin-top: 15px;
            color: #667eea;
            font-size: 14px;
        }
        .loader-container {
            text-align: center;
            padding: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loaderContainer" class="loader-container">
            <div class="spinner"></div>
            <div class="loading-text">⏳ Загрузка данных соревнования...</div>
            <div class="loading-text" style="font-size: 12px; color: #999; margin-top: 10px;">Пожалуйста, подождите немного</div>
        </div>
        
        <div id="errorBlock" style="display: none;" class="error-page"><h2>❌ Ошибка</h2><p id="errorMessage"></p></div>
        <div id="formBlock" style="display: none;">
            <h1>📄 Получить грамоту</h1>
            <div id="compNameDisplay" class="comp-name"></div>
            <div class="form-group"><label>Введите ваш email</label><input type="email" id="emailInput" placeholder="email@example.com"></div>
            <button onclick="findParticipant()" id="findBtn">Найти грамоту</button>
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <div class="loading-text">⏳ Поиск и создание грамоты...</div>
            </div>
            <div id="result" class="message"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://kcpyfbdslhisfqqobvje.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtjcHlmYmRzbGhpc2ZxcW9idmplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1Mjg1OTAsImV4cCI6MjA5MzEwNDU5MH0.Y4861DLKZ0FG3_rkosf_qH0w5P2F_hdheIBOfTTSmsI";
        const BACKGROUND_IMG_URL = "https://i.ibb.co/WNG80MfL/0.png";
        
        // ВАШИ КООРДИНАТЫ (запомнены)
        const Y = {
            headerStart: 270,        
            award: 380,             
            name: 430,              
            place: 470,             
            district: 510,          
            competition: 540,       
            result: 570,            
            team: 600,
            signLabel: 700,         
            signName: 720,          
            datePlace1: 700,        
            datePlace2: 720         
        };
        
        let supabaseClient = null;
        let currentCompetition = null;
        let currentParticipant = null;
        
        function isPrizePlace(place) {
            const placeStr = String(place).trim();
            return placeStr === '1' || placeStr === '2' || placeStr === '3' || 
                   placeStr === 'I' || placeStr === 'II' || placeStr === 'III';
        }
        
        function formatDate(dateString) {
            if (!dateString) return '';
            if (dateString.includes('-')) {
                const parts = dateString.split('-');
                if (parts.length === 3) {
                    return `${parts[2]}.${parts[1]}.${parts[0]}`;
                }
            }
            return dateString;
        }
        
        function getCompId() { return parseInt(new URLSearchParams(window.location.search).get('comp')); }
        
        async function init() {
            document.getElementById('loaderContainer').style.display = 'block';
            await new Promise(r => setTimeout(r, 500));
            
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            const compId = getCompId();
            if (!compId || isNaN(compId)) { 
                document.getElementById('loaderContainer').style.display = 'none';
                showError('Ссылка недействительна.'); 
                return; 
            }
            const { data, error } = await supabaseClient.from('competitions').select('*').eq('id', compId);
            if (error || !data || data.length === 0) { 
                document.getElementById('loaderContainer').style.display = 'none';
                showError('Соревнование не найдено.'); 
                return; 
            }
            currentCompetition = data[0];
            document.getElementById('compNameDisplay').innerHTML = `🏆 ${currentCompetition.name}`;
            
            document.getElementById('loaderContainer').style.display = 'none';
            document.getElementById('formBlock').style.display = 'block';
        }
        
        function showError(msg) {
            document.getElementById('formBlock').style.display = 'none';
            document.getElementById('errorMessage').textContent = msg;
            document.getElementById('errorBlock').style.display = 'block';
        }
        
        async function findParticipant() {
            const email = document.getElementById('emailInput').value.trim();
            if (!email) { alert('Введите email'); return; }
            
            const loadingDiv = document.getElementById('loading');
            const resultDiv = document.getElementById('result');
            const findBtn = document.getElementById('findBtn');
            
            findBtn.disabled = true;
            loadingDiv.style.display = 'block';
            resultDiv.style.display = 'none';
            
            const { data } = await supabaseClient.from('participants').select('*').eq('competition_id', currentCompetition.id).eq('email', email);
            
            findBtn.disabled = false;
            loadingDiv.style.display = 'none';
            
            if (!data || data.length === 0) { 
                showMessage('Участник с таким email не найден', 'error'); 
                return; 
            }
            const p = data[0];
            if (!p.place || p.place === '') { 
                showMessage('Результаты ещё не опубликованы', 'info'); 
                return; 
            }
            if (!isPrizePlace(p.place)) {
                showMessage('Грамоты вручаются только призёрам (1-3 место)', 'info');
                return;
            }
            currentParticipant = p;
            await generateAndDownloadPDF();
        }
        
        async function generateAndDownloadPDF() {
            const p = currentParticipant;
            const comp = currentCompetition;
            const placeText = p.place;
            const nameNominative = p.member1_name || '';
            const formattedDate = formatDate(comp.date);
            const teamText = p.team ? `команда: ${p.team}` : '';
            
            let resultText = '';
            if (p.result && p.result.trim() !== '') {
                const unit = p.result_unit ? ` ${p.result_unit}` : '';
                resultText = `с результатом ${p.result}${unit}`;
            }
            
            // ШАПКА (4 строки, чтобы влезла в рамки)
            const headerLines = [
                'Управления культуры, молодёжи и спорта',
                'муниципального образования',
                '«Муниципальный округ Дебёсский район',
                'Удмуртской Республики»'
            ];
            
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.src = BACKGROUND_IMG_URL;
            await new Promise((resolve, reject) => { img.onload = resolve; img.onerror = reject; });
            
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            
            // ШАПКА (по центру)
            ctx.font = '18px "Times New Roman", Georgia, serif';
            ctx.fillStyle = '#000000';
            ctx.textAlign = 'center';
            let headerY = Y.headerStart;
            for (const line of headerLines) {
                ctx.fillText(line, centerX, headerY);
                headerY += 24;
            }
            
            // НАГРАЖДАЕТСЯ
            ctx.font = 'bold 26px "Times New Roman", Georgia, serif';
            ctx.fillText('НАГРАЖДАЕТСЯ', centerX, Y.award);
            
            // ИМЯ
            ctx.font = 'bold 22px "Times New Roman", Georgia, serif';
            ctx.fillText(nameNominative, centerX, Y.name);
            
            // МЕСТО
            ctx.font = '22px "Times New Roman", Georgia, serif';
            ctx.fillText(`за ${placeText} место`, centerX, Y.place);
            
            // В РАЙОННЫХ СОРЕВНОВАНИЯХ
            ctx.font = '18px "Times New Roman", Georgia, serif';
            ctx.fillText('в районных соревнованиях', centerX, Y.district);
            
            // НАЗВАНИЕ СОРЕВНОВАНИЯ
            ctx.font = 'bold 20px "Times New Roman", Georgia, serif';
            ctx.fillText(`«${comp.name}»`, centerX, Y.competition);
            
            // РЕЗУЛЬТАТ
            if (resultText) {
                ctx.font = '18px "Times New Roman", Georgia, serif';
                ctx.fillText(resultText, centerX, Y.result);
            }
            
            // КОМАНДА
            if (teamText) {
                ctx.font = '16px "Times New Roman", Georgia, serif';
                ctx.fillText(teamText, centerX, Y.team);
            }
            
            // НАЧАЛЬНИК (слева)
            ctx.font = '18px "Times New Roman", Georgia, serif';
            ctx.textAlign = 'left';
            ctx.fillText('Начальник', 130, Y.signLabel);
            ctx.fillText('А.С. Дурновцев', 130, Y.signName);
            
            // ДАТА И МЕСТО (справа)
            ctx.font = '16px "Times New Roman", Georgia, serif';
            ctx.textAlign = 'right';
            ctx.fillText(formattedDate, canvas.width - 130, Y.datePlace1);
            ctx.fillText(comp.event_place || '', canvas.width - 130, Y.datePlace2);
            
            const imgData = canvas.toDataURL('image/png');
            const { jsPDF } = window.jspdf;
            const pdfWidth = 210;
            const pdfHeight = (canvas.height / canvas.width) * pdfWidth;
            const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: [pdfWidth, pdfHeight] });
            doc.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
            doc.save(`Грамота_${p.member1_name}.pdf`);
            
            showMessage('✅ Грамота готова!', 'success');
        }
        
        function showMessage(msg, type) {
            const div = document.getElementById('result');
            div.className = `message ${type}`;
            div.textContent = msg;
            div.style.display = 'block';
        }
        
        init();
    </script>
</body>
</html>
