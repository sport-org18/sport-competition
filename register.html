<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация на соревнования</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 20px; width: 100%; max-width: 500px; padding: 40px; }
        h1 { text-align: center; margin-bottom: 10px; }
        .comp-name { text-align: center; color: #667eea; margin-bottom: 30px; font-weight: bold; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; }
        .message { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .loading { text-align: center; margin: 20px 0; }
        .error-page { text-align: center; padding: 20px; }
        .error-page h2 { color: #e74c3c; }
    </style>
</head>
<body>
    <div class="container">
        <div id="errorBlock" style="display: none;" class="error-page">
            <h2>❌ Ошибка</h2>
            <p id="errorMessage"></p>
        </div>
        <div id="formBlock">
            <h1>Регистрация на соревнования</h1>
            <div id="compNameDisplay" class="comp-name"></div>
            <form id="registrationForm">
                <div class="form-group"><label>ФИО *</label><input type="text" id="name" required></div>
                <div class="form-group"><label>Email *</label><input type="email" id="email" required></div>
                <div class="form-group"><label>Дата рождения *</label><input type="date" id="birthdate" required onchange="calculateCategory()"></div>
                <div class="form-group"><label>Категория</label><input type="text" id="category" readonly placeholder="Определится автоматически"></div>
                <div class="form-group"><label>Команда/Клуб</label><input type="text" id="team"></div>
                <div class="form-group"><label>Соревнование</label><input type="text" id="competition" readonly></div>
                <button type="submit">Зарегистрироваться</button>
            </form>
            <div id="message" class="message"></div>
            <div id="loading" class="loading" style="display: none;">⏳ Отправка...</div>
        </div>
    </div>
    <script>
        let supabaseClient = null;
        let currentCompetition = null;
        
        function getCompId() { return parseInt(new URLSearchParams(window.location.search).get('comp')); }
        
        async function init() {
            const url = localStorage.getItem('supabase_url');
            const key = localStorage.getItem('supabase_key');
            if (!url || !key) { showError('Ошибка: не настроено подключение к базе данных. Обратитесь к организатору.'); return false; }
            supabaseClient = supabase.createClient(url, key);
            const compId = getCompId();
            if (!compId) { showError('Ссылка недействительна.'); return false; }
            const { data, error } = await supabaseClient.from('competitions').select('*').eq('id', compId);
            if (error || !data || data.length === 0) { showError('Соревнование не найдено.'); return false; }
            currentCompetition = data[0];
            document.getElementById('compNameDisplay').innerHTML = `🏆 ${currentCompetition.name}`;
            document.getElementById('competition').value = currentCompetition.name;
            return true;
        }
        
        function calculateCategory() {
            const birthdate = document.getElementById('birthdate').value;
            if (!birthdate) return;
            const age = new Date().getFullYear() - new Date(birthdate).getFullYear();
            const cats = currentCompetition.age_categories || [];
            const match = cats.find(c => age >= c.min && age <= c.max);
            document.getElementById('category').value = match ? match.name : 'Не определена';
        }
        
        function showError(msg) {
            document.getElementById('formBlock').style.display = 'none';
            const errDiv = document.getElementById('errorBlock');
            document.getElementById('errorMessage').textContent = msg;
            errDiv.style.display = 'block';
        }
        
        document.getElementById('registrationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const birthdate = document.getElementById('birthdate').value;
            const category = document.getElementById('category').value;
            const team = document.getElementById('team').value;
            if (category === 'Не определена') { alert('Категория не определена'); return; }
            const participant = {
                id: Date.now(),
                competition_id: currentCompetition.id,
                name, email, birthdate, category, team,
                competition: currentCompetition.name,
                place: 'Не определено',
                registered_at: new Date().toLocaleString(),
                certificate_generated: false
            };
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            document.getElementById('loading').style.display = 'block';
            const { error } = await supabaseClient.from('participants').insert([participant]);
            btn.disabled = false;
            document.getElementById('loading').style.display = 'none';
            if (error) { alert('Ошибка: ' + error.message); return; }
            document.getElementById('message').className = 'message success';
            document.getElementById('message').textContent = '✅ Регистрация успешна!';
            document.getElementById('message').style.display = 'block';
            e.target.reset();
            document.getElementById('competition').value = currentCompetition.name;
        });
        
        init();
    </script>
</body>
</html>
