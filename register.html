<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация на соревнования</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 20px; width: 100%; max-width: 500px; padding: 40px; }
        h1 { text-align: center; margin-bottom: 10px; }
        .comp-name { text-align: center; color: #667eea; margin-bottom: 30px; font-weight: bold; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .message { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .loading { text-align: center; margin: 20px 0; display: none; }
        .error-page { text-align: center; padding: 20px; }
        .error-page h2 { color: #e74c3c; }
        
        /* Стили для индикатора загрузки */
        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            margin-top: 15px;
            color: #667eea;
            font-size: 14px;
        }
        .loader-container {
            text-align: center;
            padding: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Индикатор загрузки (показывается сначала) -->
        <div id="loaderContainer" class="loader-container">
            <div class="spinner"></div>
            <div class="loading-text">⏳ Загрузка данных соревнования...</div>
            <div class="loading-text" style="font-size: 12px; color: #999; margin-top: 10px;">Пожалуйста, подождите несколько секунд</div>
        </div>
        
        <div id="errorBlock" style="display: none;" class="error-page"><h2>❌ Ошибка</h2><p id="errorMessage"></p></div>
        <div id="formBlock" style="display: none;">
            <h1>Регистрация на соревнования</h1>
            <div id="compNameDisplay" class="comp-name"></div>
            <form id="registrationForm">
                <div class="form-group"><label>ФИО участника *</label><input type="text" id="fullName" required></div>
                <div class="form-group"><label>Email *</label><input type="email" id="email" required></div>
                <div class="form-group"><label>Дата рождения *</label><input type="date" id="birthdate" required onchange="calculateCategory()"></div>
                <div class="form-group"><label>Категория</label><input type="text" id="category" readonly placeholder="Определится автоматически"></div>
                <div class="form-group"><label>Команда/Клуб</label><input type="text" id="team" placeholder="Название команды (если командное соревнование)"></div>
                <div class="form-group"><label>Соревнование</label><input type="text" id="competition" readonly></div>
                <button type="submit" id="submitBtn">Зарегистрироваться</button>
            </form>
            <div id="message" class="message"></div>
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <div class="loading-text">⏳ Отправка данных...</div>
            </div>
        </div>
    </div>
    <script>
        const SUPABASE_URL = "https://kcpyfbdslhisfqqobvje.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtjcHlmYmRzbGhpc2ZxcW9idmplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1Mjg1OTAsImV4cCI6MjA5MzEwNDU5MH0.Y4861DLKZ0FG3_rkosf_qH0w5P2F_hdheIBOfTTSmsI";
        
        let supabaseClient = null;
        let currentCompetition = null;
        
        function getCompId() {
            const urlParams = new URLSearchParams(window.location.search);
            return parseInt(urlParams.get('comp'));
        }
        
        async function init() {
            // Показываем загрузку
            document.getElementById('loaderContainer').style.display = 'block';
            
            // Имитируем небольшую задержку для плавности
            await new Promise(r => setTimeout(r, 500));
            
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            const compId = getCompId();
            if (!compId || isNaN(compId)) { 
                document.getElementById('loaderContainer').style.display = 'none';
                showError('Ссылка недействительна.'); 
                return; 
            }
            const { data, error } = await supabaseClient.from('competitions').select('*').eq('id', compId);
            if (error || !data || data.length === 0) { 
                document.getElementById('loaderContainer').style.display = 'none';
                showError('Соревнование не найдено.'); 
                return; 
            }
            currentCompetition = data[0];
            document.getElementById('compNameDisplay').innerHTML = `🏆 ${currentCompetition.name}`;
            document.getElementById('competition').value = currentCompetition.name;
            
            // Скрываем загрузчик, показываем форму
            document.getElementById('loaderContainer').style.display = 'none';
            document.getElementById('formBlock').style.display = 'block';
        }
        
        function calculateCategory() {
            const birthdate = document.getElementById('birthdate').value;
            if (!birthdate) return;
            const birthDate = new Date(birthdate);
            let age = new Date().getFullYear() - birthDate.getFullYear();
            const monthDiff = new Date().getMonth() - birthDate.getMonth();
            if (monthDiff < 0 || (monthDiff === 0 && new Date().getDate() < birthDate.getDate())) age--;
            const cats = currentCompetition.age_categories || [];
            const match = cats.find(c => age >= c.min && age <= c.max);
            document.getElementById('category').value = match ? match.name : 'Не определена';
        }
        
        function showError(msg) {
            document.getElementById('formBlock').style.display = 'none';
            document.getElementById('errorMessage').textContent = msg;
            document.getElementById('errorBlock').style.display = 'block';
        }
        
        document.getElementById('registrationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const birthdate = document.getElementById('birthdate').value;
            const category = document.getElementById('category').value;
            const team = document.getElementById('team').value;
            if (category === 'Не определена') { alert('Ваш возраст не подходит ни под одну категорию'); return; }
            
            const participant = {
                id: Date.now(),
                competition_id: currentCompetition.id,
                member1_name: fullName,
                member2_name: '',
                email: email,
                birthdate: birthdate,
                category: category,
                team: team,
                competition: currentCompetition.name,
                place: '',
                registered_at: new Date().toLocaleString(),
                certificate_generated: false,
                result: ''
            };
            
            const submitBtn = document.getElementById('submitBtn');
            const loadingDiv = document.getElementById('loading');
            const messageDiv = document.getElementById('message');
            
            submitBtn.disabled = true;
            loadingDiv.style.display = 'block';
            messageDiv.style.display = 'none';
            
            const { error } = await supabaseClient.from('participants').insert([participant]);
            
            submitBtn.disabled = false;
            loadingDiv.style.display = 'none';
            
            if (error) { 
                messageDiv.className = 'message error';
                messageDiv.textContent = '❌ Ошибка при регистрации: ' + error.message;
                messageDiv.style.display = 'block';
                return; 
            }
            messageDiv.className = 'message success';
            messageDiv.textContent = '✅ Регистрация успешна!';
            messageDiv.style.display = 'block';
            e.target.reset();
            document.getElementById('competition').value = currentCompetition.name;
        });
        
        init();
    </script>
</body>
</html>
